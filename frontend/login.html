<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Smart Complaint Portal</title>

<style>
/* ... (Tuzya design cha CSS same theva, tyat badlav garjecha nahi) ... */
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Poppins', 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #020617, #0f172a);
  color: white;
  overflow: hidden;
}

.glow {
  position: absolute;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(56,189,248,0.25), transparent);
  filter: blur(120px);
}

.login-box {
  width: 320px;
  padding: 30px;
  border-radius: 15px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  border: 1px solid rgba(255,255,255,0.1);
  text-align: center;
  z-index: 2;
}

.logo {
  width: 80px;
  margin-bottom: 10px;
  filter: drop-shadow(0 0 8px white);
}

h2 { margin-bottom: 5px; color: #f5e6c8; }
p { font-size: 12px; color: #38bdf8; margin-bottom: 20px; }

input, select {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(15, 23, 42, 0.8);
  color: white;
  outline: none;
  box-sizing: border-box;
}

button {
  width: 100%;
  padding: 12px;
  background: linear-gradient(45deg,#f97316,#facc15);
  border: none;
  border-radius: 8px;
  font-weight: bold;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}
button:hover { background: #ea580c; transform: scale(1.02); }
</style>

</head>

<body>
<div class="glow"></div>
<div class="login-box">
  <img src="assets/logo.png" class="logo" alt="College Logo">
  <h2>Login</h2>
  <p>Secure Access Portal</p>

  <input type="text" id="username" placeholder="Enter Email / ID" required>
  <input type="password" id="password" placeholder="Enter Password" required>

  <select id="role">
    <option value="Student">Student</option>
    <option value="Admin">Admin</option>
  </select>

  <button onclick="loginUser()">Login</button>
</div>

<script>
async function loginUser() {
    let role = document.getElementById("role").value;
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    if (role === "Admin") {
        try {
            // 1. Backend API call
            const response = await fetch("/api/admin/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email: user, password: pass })
            });

            const data = await response.json();

            if (response.ok) {
                // 2. Data save kara (Modal popup sathi he garjeche aahe)
                localStorage.setItem("userEmail", user);
                localStorage.setItem("userLevel", data.role); // HOD/Principal
                localStorage.setItem("userRole", "Admin");
                
                // Dashboard var pathva
                window.location.href = "admin.html"; 
            } else {
                alert(data.message || "Invalid Admin Credentials!");
            }
        } catch (error) {
            console.error(error);
            alert("Backend connected nahiye! Check server.js");
        }
    } else {
        // Student Logic
        localStorage.setItem("userRole", "Student");
        localStorage.setItem("studentID", user);
        window.location.href = "select_dept.html"; 
    }
}
</script>

</body>
</html>
