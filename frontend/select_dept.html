<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Department | P.R. Pote Patil College</title>

<style>
/* 🎨 UI DESIGN - Modern Glassmorphism */
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
    color: white;
    overflow: hidden;
}

/* 🌟 Background Glow */
.glow {
    position: absolute;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(56,189,248,0.15), transparent);
    -webkit-filter: blur(100px);
    filter: blur(100px);
    z-index: 1;
}

/* 🔥 Selection Card */
.selection-box {
    width: 350px;
    padding: 40px;
    border-radius: 24px;
    background: rgba(255, 255, 255, 0.03);
    -webkit-backdrop-filter: blur(15px);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    text-align: center;
    z-index: 2;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}


.logo {
    width: 70px;
    margin-bottom: 15px;
    -webkit-filter: drop-shadow(0 0 10px white); /* Safari sathi */
    filter: drop-shadow(0 0 10px white);         /* Standard Shine */
}


h2 {
    margin-bottom: 10px;
    background: linear-gradient(to right, #f97316, #facc15);
    -webkit-background-clip: text; /* Vendor prefix aadhi */
    background-clip: text;          /* Standard property nantar */
    -webkit-text-fill-color: transparent;
    font-weight: 700;
}

p { font-size: 13px; color: #94a3b8; margin-bottom: 25px; }

/* Dropdown Style */
select {
    width: 100%;
    padding: 14px;
    margin-bottom: 25px;
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    background: rgba(15, 23, 42, 0.8);
    color: white;
    outline: none;
    font-size: 15px;
    cursor: pointer;
}

select:focus { border-color: #38bdf8; }

/* Continue Button */
.btn-continue {
    width: 100%;
    padding: 15px;
    background: linear-gradient(45deg, #f97316, #ea580c);
    border: none;
    border-radius: 12px;
    color: white;
    font-weight: 700;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.btn-continue:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 20px rgba(249, 115, 22, 0.3);
}

.logout-link {
    display: block;
    margin-top: 20px;
    color: #ef4444;
    text-decoration: none;
    font-size: 12px;
    font-weight: 600;
}
</style>

<script>
    window.onload = function() {
        if (!localStorage.getItem("userRole")) {
            window.location.href = "login.html";
        }
    }

    function saveAndContinue() {
        const dept = document.getElementById("deptSelect").value;
        if (dept === "") {
            alert("Krupaya tumcha Department nivada!");
            return;
        }
        localStorage.setItem("userDept", dept);
        window.location.href = "index.html"; 
    }

    function logout() {
        localStorage.clear();
        window.location.href = "login.html";
    }
</script>
</head>

<body>
    <div class="glow"></div>
    <div class="selection-box">
        <img src="assets/logo.png" class="logo" alt="College Logo">
        <h2>Welcome!</h2>
        <p>Select your Department to continue to the Complaint Portal</p>

        <select id="deptSelect" title="Select Department">
            <option value="AI-DS">AI-DS</option>
                    <option value="AIML">AIML</option>
                    <option value="CSE">CSE</option>
                    <option value="EXTC">EXTC</option>
                    <option value="MECH">MECH</option>
                    <option value="CIVIL">CIVIL</option>
        </select>

        <button class="btn-continue" onclick="saveAndContinue()">Continue to Portal</button>
        <a href="#" class="logout-link" onclick="logout()">Cancel & Logout</a>
    </div>
</body>
</html>
