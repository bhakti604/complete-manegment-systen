<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home - P.R. Pote Patil Complaint Portal</title>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      display: flex;
      align-items: center;
      padding: 15px 40px;
      background: rgba(15, 23, 42, 0.9);
      -webkit-backdrop-filter: blur(10px); 
      backdrop-filter: blur(10px);
      border-bottom: 3px solid #f97316; 
      gap: 15px;
    }

    .logo { width: 55px; }

    .header h2 { 
      margin: 0; 
      font-size: 1.3rem; 
      letter-spacing: 1px; 
      font-weight: 700;
    }

    /* ✅ NEW CLASS FOR COLLEGE SUBTITLE */
    .college-sub-title {
      font-size: 11px;
      color: #facc15;
      margin: 0;
      letter-spacing: 0.5px;
    }

    .nav {
      background: rgba(30, 58, 138, 0.2);
      padding: 12px;
      text-align: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .nav a {
      color: #94a3b8;
      text-decoration: none;
      margin: 0 20px;
      font-weight: 600;
      font-size: 14px;
      transition: 0.3s;
    }

    .nav a:hover { color: #facc15; }

    .center {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
      background: linear-gradient(to right, #f97316, #facc15);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .sub-text {
      color: #38bdf8;
      font-size: 18px;
      margin-bottom: 40px;
      font-weight: 300;
    }

    .main-btn {
      background: linear-gradient(45deg, #f97316, #ea580c);
      border: none;
      color: white;
      padding: 18px 45px;
      font-size: 18px;
      font-weight: 700;
      border-radius: 50px;
      cursor: pointer;
      text-transform: uppercase;
      box-shadow: 0 10px 25px rgba(234, 88, 12, 0.3);
      transition: 0.4s;
    }

    .main-btn:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 35px rgba(234, 88, 12, 0.5);
      letter-spacing: 1px;
    }

    .features-grid {
      display: flex;
      gap: 20px;
      margin-top: 50px;
    }

    .card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 20px;
      border-radius: 15px;
      width: 200px;
      -webkit-backdrop-filter: blur(5px);
      backdrop-filter: blur(5px);
    }
    
    .card-icon { font-size: 20px; }
    .card p { font-size: 12px; color: #94a3b8; margin: 5px 0 0; }
    
    .logout-link { color: #ef4444; }
    .register-link { text-decoration: none; }
  </style>
</head>
<body>

<div class="header">
  <img src="assets/logo.png" class="logo" alt="College Logo">
  <div>
    <h2>P. R. POTE PATIL COLLEGE</h2>
    <p class="college-sub-title">ENGINEERING & MANAGEMENT, AMRAVATI</p>
  </div>
</div>

<div class="nav">
  <a href="dashboard.html">📊 Dashboard</a>
  <a href="info.html">ℹ️ College Info</a>
  <a href="login.html" class="logout-link">🔒 Logout</a>
</div>

<div class="center">
  <h1>Welcome to Complaint Portal</h1>
  <p class="sub-text">Empowering Students • Solving Problems Faster ⚡</p>

  <a href="index.html" class="register-link">
    <button class="main-btn">📝 Register Complaint</button>
  </a>

  <div class="features-grid">
    <div class="card">
      <span class="card-icon">⚡</span>
      <p>Instant Submission</p>
    </div>
    <div class="card">
      <span class="card-icon">🔍</span>
      <p>Live Tracking</p>
    </div>
    <div class="card">
      <span class="card-icon">🏛️</span>
      <p>Direct Action</p>
    </div>
  </div>
</div>

</body>
</html>
