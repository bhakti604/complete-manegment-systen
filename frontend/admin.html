<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | P.R. Pote Patil College</title>

    <style>
        /* 🎨 PREMIUM UI DESIGN */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

        body { 
            margin: 0; 
            font-family: 'Poppins', sans-serif; 
            background: #020617; 
            background-image: 
                radial-gradient(at 0% 0%, rgba(30, 58, 138, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(249, 115, 22, 0.1) 0px, transparent 50%);
            color: white; 
            min-height: 100vh; 
        }

        /* HEADER */
        .header { 
            display: flex; 
            justify-content: space-between; 
            padding: 15px 40px; 
            background: rgba(15, 23, 42, 0.8);
            -webkit-backdrop-filter: blur(15px); 
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        /* MODAL STYLES */
        #profileModal {
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(2, 6, 23, 0.95); 
            z-index: 2000; 
            align-items: center; 
            justify-content: center;
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
        }

        .modal-content {
            background: #0f172a; 
            padding: 40px; 
            border-radius: 24px; 
            width: 90%;
            max-width: 450px; 
            border: 1px solid #38bdf8;
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.2);
        }

        .modal-title { color: #38bdf8; margin-top: 0; }
        .modal-text { color: #94a3b8; font-size: 14px; }
        .input-label { font-size: 14px; color: #fff; display: block; margin-top: 10px; }
        .margin-v { margin-top: 8px; margin-bottom: 20px; }

        .logo-container { display: flex; align-items: center; gap: 15px; }
        .college-logo { width: 40px; filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.3)); }
        .title { font-weight: 700; font-size: 1.2rem; }
        .nav-btns { display: flex; gap: 15px; align-items: center; }
        .nav-link { color: #94a3b8; text-decoration: none; font-size: 14px; transition: 0.3s; }
        .nav-link:hover { color: #38bdf8; }
        .export-btn { background: #10b981; color: white; border: none; padding: 8px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .logout-btn { background: #ef4444; color: white; border: none; padding: 8px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .stats { display: flex; gap: 20px; padding: 25px 40px; }
        .stat-box { flex: 1; padding: 20px; border-radius: 20px; background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(255, 255, 255, 0.05); text-align: center; }
        .pending-count { color: #f97316; }
        .done-count { color: #22c55e; }
        .search-container { padding: 0 40px; margin-bottom: 25px; }
        .search-box { width: 100%; padding: 15px 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(15, 23, 42, 0.6); color: white; outline: none; box-sizing: border-box; }
        .container { padding: 0 40px 40px; max-width: 1100px; margin: auto; }
        .card { background: rgba(30, 41, 59, 0.4); border-radius: 20px; padding: 25px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .id-tag { color: #38bdf8; font-weight: 700; background: rgba(56, 189, 248, 0.1); padding: 3px 8px; border-radius: 5px; font-size: 0.8rem; }
        .message-box { background: rgba(15, 23, 42, 0.4); padding: 15px; border-radius: 12px; border-left: 3px solid #f97316; margin-top: 10px; }
        .action-btn { width: 100%; padding: 12px; border: none; border-radius: 10px; background: linear-gradient(45deg, #38bdf8, #2563eb); color: white; font-weight: 700; cursor: pointer; margin-top: 10px; }
    </style>
</head>

<body onload="initDashboard()">

    <div class="header">
        <div class="logo-container">
            <img src="assets/logo.png" alt="Logo" class="college-logo">
            <span class="title">Admin Dashboard</span>
        </div>
        <div class="nav-btns">
            <a href="home.html" class="nav-link">Home</a>
            <button class="export-btn" onclick="exportCSV()">📥 Export</button>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="stats">
        <div class="stat-box"><h2 id="pendingCount" class="pending-count">0</h2><p>Pending</p></div>
        <div class="stat-box"><h2 id="doneCount" class="done-count">0</h2><p>Resolved</p></div>
    </div>

    <div class="search-container">
        <input type="text" id="search" class="search-box" placeholder="🔍 Search complaints..." onkeyup="searchData()">
    </div>

    <div id="list" class="container"></div>

    <div id="profileModal">
        <div class="modal-content">
            <h2 class="modal-title">Complete Profile</h2>
            <p class="modal-text">Update details to receive department-specific alerts.</p>
            
            <label class="input-label">Department</label>
            <select id="adminDeptInput" class="search-box margin-v" title="Select Department">
                <option value="AI-DS">AI-DS</option>
                <option value="AIML">AIML</option>
                <option value="CSE">CSE</option>
                <option value="MECH">MECH</option>
            </select>

            <label class="input-label">Mobile Number</label>
            <input type="text" id="adminMobile" placeholder="e.g. 8329046037" class="search-box margin-v">

            <button onclick="saveAdminProfile()" class="action-btn">Save & Continue</button>
        </div>
    </div>

    <script>
        // 1. Initial Dashboard Setup
        async function initDashboard() {
            const email = localStorage.getItem("userEmail");
            if (!email) {
                window.location.href = "login.html";
                return;
            }

            // Database madhun profile check kara
            try {
                const res = await fetch(`/api/admin/profile?email=${email}`);
                const admin = await res.json();

                if (!admin || !admin.dept || admin.dept === "") {
                    document.getElementById("profileModal").style.display = "flex";
                } else {
                    localStorage.setItem("userDept", admin.dept);
                    loadData();
                }
            } catch (err) {
                console.error("Init Error:", err);
                loadData(); // Error aala tari default load cha prayatna kara
            }
        }

        // 2. Profile Save Logic
        async function saveAdminProfile() {
            const email = localStorage.getItem("userEmail");
            const dept = document.getElementById("adminDeptInput").value;
            const mobile = document.getElementById("adminMobile").value;

            if (!mobile) { alert("Mobile number garjecha aahe!"); return; }

            try {
                const res = await fetch("/api/admin/update-profile", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, dept, mobile })
                });

                if (res.ok) {
                    localStorage.setItem("userDept", dept);
                    document.getElementById("profileModal").style.display = "none";
                    loadData();
                }
            } catch (err) {
                alert("Update failed!");
            }
        }

        // 3. Load & Filter Data
        async function loadData() {
            const listContainer = document.getElementById("list");
            const adminDept = localStorage.getItem("userDept") || "AI-DS"; 
            
            console.log("Fetching data for:", adminDept);

            try {
                const res = await fetch("/api/complaints");
                const data = await res.json();

                const filtered = data.filter(c => 
                    c.dept && c.dept.trim().toUpperCase() === adminDept.trim().toUpperCase()
                );

                // Stats Update
                document.getElementById("pendingCount").innerText = filtered.filter(c => c.status !== "Resolved").length;
                document.getElementById("doneCount").innerText = filtered.filter(c => c.status === "Resolved").length;

                if (filtered.length === 0) {
                    listContainer.innerHTML = `<p style='text-align:center; padding:50px;'>No complaints found for ${adminDept}.</p>`;
                    return;
                }

                let html = "";
                filtered.forEach(c => {
                    const statusColor = c.status === "Resolved" ? "#22c55e" : "#f97316";
                    html += `
                        <div class="card">
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <span class="id-tag">ID: ${c._id.slice(-6)}</span>
                                <span style="color:${statusColor}; font-weight:bold;">${c.status}</span>
                            </div>
                            <h3 style="margin:15px 0 5px 0;">${c.fullName}</h3>
                            <p style="color:#94a3b8; font-size:13px; margin-bottom:10px;">${c.category} | Priority: ${c.priority}</p>
                            <div class="message-box">${c.msg}</div>
                            ${c.status !== "Resolved" ? `<button class="action-btn" onclick="updateStatus('${c._id}')">Mark as Resolved</button>` : ''}
                        </div>
                    `;
                });
                listContainer.innerHTML = html;
            } catch (err) {
                listContainer.innerHTML = "<p style='color:red; text-align:center;'>Unable to connect to server.</p>";
            }
        }

        async function updateStatus(id) {
            try {
                await fetch(`/api/complaints/${id}`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ status: "Resolved" })
                });
                loadData();
            } catch (err) { alert("Update failed"); }
        }

        function logout() {
            localStorage.clear();
            window.location.href = "login.html";
        }
        
        function searchData() {
            const term = document.getElementById("search").value.toLowerCase();
            const cards = document.querySelectorAll(".card");
            cards.forEach(card => {
                const text = card.innerText.toLowerCase();
                card.style.display = text.includes(term) ? "block" : "none";
            });
        }
    </script>
</body>
</html>
